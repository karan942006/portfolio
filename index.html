<div class="contact-form">

  <form 
    action="https://formsubmit.co/karan942006@gmail.com" 
    method="POST"
  >

    <!-- Hidden Settings -->
    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_template" value="table">
    <input type="hidden" name="_subject" value="New Internship Opportunity">
    
    <!-- Redirect After Submit -->
    <input 
      type="hidden" 
      name="_next" 
      value="https://karan942006.github.io/portfolio/"
    >

    <!-- Name -->
    <div class="form-group">
      <label class="form-label">Your Name</label>

      <input
        type="text"
        name="name"
        class="form-input"
        placeholder="John Doe"
        required
      >
    </div>

    <!-- Email -->
    <div class="form-group">
      <label class="form-label">Your Email</label>

      <input
        type="email"
        name="email"
        class="form-input"
        placeholder="john@company.com"
        required
      >
    </div>

    <!-- Company -->
    <div class="form-group">
      <label class="form-label">Company</label>

      <input
        type="text"
        name="company"
        class="form-input"
        placeholder="Company Name"
      >
    </div>

    <!-- Message -->
    <div class="form-group">
      <label class="form-label">Message</label>

      <textarea
        name="message"
        class="form-textarea"
        placeholder="Hi Karan, I'd like to discuss an internship opportunity..."
        required
      ></textarea>
    </div>

    <!-- Button -->
    <button type="submit" class="form-submit">
      Send Message →
    </button>

  </form>

</div>
